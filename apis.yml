description: >-
  Alliance One International was a global leaf tobacco merchant that purchased,
  processed, and sold leaf tobacco to manufacturers of cigarettes and other
  consumer tobacco products. Founded in 2005 through the merger of Dimon
  Incorporated and Standard Commercial Corporation, Alliance One International
  became one of the world's two largest leaf tobacco dealers. The company
  sourced tobacco from major growing regions including the United States,
  Brazil, Zimbabwe, Malawi, Turkey, and other countries. In 2018, Alliance One
  International changed its name to Pyxus International, reflecting a broader
  diversification strategy beyond tobacco into hemp, cannabis, and e-liquids.
  As an agricultural commodity trading business, Alliance One International
  did not maintain a public developer API program.
